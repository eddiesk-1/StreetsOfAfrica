<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streets of Africa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; color: white; background: black; }
    #background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-repeat: no-repeat; background-attachment: fixed; z-index: -1; display: none; }
    header { background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; padding: 10px; position: fixed; width: 100%; z-index: 10; }
    #logo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
    .icons i { font-size: 24px; margin-left: 20px; cursor: pointer; }
    #search-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 10px; display: flex; z-index: 10; }
    #search-input { flex: 1; padding: 10px; background: white; color: black; border: none; }
    #search-btn { background: transparent; border: none; color: white; font-size: 24px; cursor: pointer; }
    #service-container { position: relative; height: 100vh; overflow: hidden; }
    .service-circle { position: absolute; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 10px; cursor: pointer; transition: transform 0.2s; color: black; }
    .service-circle.expanded { width: 80% !important; height: auto !important; left: 10% !important; top: 20% !important; z-index: 20; background: white !important; color: black; border-radius: 10px; padding: 20px; }
    .service-circle.expanded img { max-width: 100%; }
    .remove-btn { display: none; position: absolute; top: 5px; right: 5px; color: red; cursor: pointer; }
    .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); padding: 20px; z-index: 20; width: 80%; max-width: 400px; color: white; }
    .popup input, .popup textarea, .popup select { width: 100%; margin-bottom: 10px; padding: 10px; background: white; color: black; border: none; }
    .popup button { padding: 10px; background: green; color: white; border: none; cursor: pointer; }
    .close-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; color: red; }
    #message-list { height: 200px; overflow-y: scroll; background: white; color: black; padding: 10px; margin-bottom: 10px; }
    #settings-toggle { margin-left: 10px; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div id="background"></div>
  <header>
    <img id="logo" src="/logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=Logo';">
    <div class="icons">
      <i class="fas fa-plus" id="post-icon"></i>
      <i class="fas fa-user" id="profile-icon"></i>
      <i class="fas fa-envelope" id="msg-icon"></i>
      <i class="fas fa-cog" id="settings-toggle" title="Toggle Background"></i>
    </div>
  </header>
  <div id="service-container"></div>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Search services...">
    <button id="search-btn"><i class="fas fa-search"></i></button>
  </div>

  <!-- Posting Form -->
  <div class="popup" id="post-form">
    <span class="close-btn" onclick="closePopup('post-form')">X</span>
    <input type="text" id="post-username" placeholder="Username (user@0123456789)" value="user@0123456789">
    <input type="text" id="post-title" placeholder="Title (required)">
    <textarea id="post-desc" placeholder="Description (optional)"></textarea>
    <select id="post-category">
      <option value="">Select Category (required)</option>
      <option value="Food">Food</option>
      <option value="Crafts">Crafts</option>
      <option value="Services">Services</option>
      <option value="Fashion">Fashion</option>
      <option value="Technology">Technology</option>
      <option value="Education">Education</option>
      <option value="Health">Health</option>
      <option value="Agriculture">Agriculture</option>
    </select>
    <input type="number" id="post-price" placeholder="Price (optional)">
    <input type="file" id="post-photo" accept="image/*">
    <input type="file" id="post-music" accept="audio/*">
    <input type="file" id="post-document" accept=".pdf,.doc,.docx">
    <button onclick="postService()">Post</button>
  </div>

  <!-- Messaging Form -->
  <div class="popup" id="msg-form">
    <span class="close-btn" onclick="closePopup('msg-form')">X</span>
    <input type="text" id="msg-to" placeholder="To (username@1234567890)" oninput="loadMessages()">
    <div id="msg-status"></div>
    <div id="message-list"></div>
    <textarea id="msg-content" placeholder="Message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>

  <!-- Profile Form -->
  <div class="popup" id="profile-form">
    <span class="close-btn" onclick="closePopup('profile-form')">X</span>
    <input type="text" id="profile-username" placeholder="Update Username">
    <button onclick="saveProfile()">Save</button>
    <div id="posted-services"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
  <script>
    const socket = io();
    let currentUser = localStorage.getItem('username') || '';
    if (!currentUser || !/^[a-zA-Z0-9_]+@[0-9]{10}$/.test(currentUser)) {
      currentUser = prompt('Enter your username (e.g., user@0123456789)', 'user@0123456789');
      while (!/^[a-zA-Z0-9_]+@[0-9]{10}$/.test(currentUser)) {
        currentUser = prompt('Invalid username. Try again.', 'user@0123456789');
      }
      localStorage.setItem('username', currentUser);
    }
    socket.emit('registerUser', currentUser);

    let services = [];
    let velocities = [];
    let animationStart = Date.now();
    const categoryColors = {
      Food: 'green', Crafts: 'blue', Services: 'orange', Fashion: 'purple',
      Technology: 'red', Education: 'yellow', Health: 'pink', Agriculture: 'brown'
    };

    // Fetch initial services
    fetch('/api/services').then(res => res.json()).then(data => {
      services = data;
      renderServices();
      animateCircles();
    });

    // Real-time updates
    socket.on('serviceAdded', service => {
      services.push(service);
      renderServices();
    });
    socket.on('serviceUpdated', updated => {
      const index = services.findIndex(s => s.id === updated.id);
      if (index !== -1) services[index] = updated;
      renderServices();
    });
    socket.on('serviceRemoved', id => {
      services = services.filter(s => s.id !== id);
      renderServices();
    });
    socket.on('newMessage', msg => {
      if ((msg.to === currentUser || msg.from === currentUser) && document.getElementById('msg-form').style.display === 'block') {
        loadMessages();
      }
    });
    socket.on('userStatus', ({username, status}) => {
      if (document.getElementById('msg-to').value === username) {
        document.getElementById('msg-status').innerText = `${username} is ${status}`;
      }
    });

    // Background toggle
    const bg = document.getElementById('background');
    const toggleBg = () => {
      const show = bg.style.display === 'none';
      bg.style.display = show ? 'block' : 'none';
      bg.style.backgroundImage = show ? 'url(/background.jpg)' : '';
    };
    document.getElementById('settings-toggle').onclick = toggleBg;

    // Open popups
    document.getElementById('post-icon').onclick = () => {
      document.getElementById('post-username').value = currentUser;
      showPopup('post-form');
    };
    document.getElementById('profile-icon').onclick = () => {
      showPopup('profile-form');
      document.getElementById('profile-username').value = currentUser;
      loadPostedServices();
    };
    document.getElementById('msg-icon').onclick = () => {
      showPopup('msg-form');
      loadMessages();
    };

    function showPopup(id) {
      document.getElementById(id).style.display = 'block';
    }
    function closePopup(id) {
      document.getElementById(id).style.display = 'none';
    }

    // Post service
    function postService() {
      const username = document.getElementById('post-username').value;
      const title = document.getElementById('post-title').value;
      const desc = document.getElementById('post-desc').value;
      const category = document.getElementById('post-category').value;
      const price = document.getElementById('post-price').value;
      if (!/^[a-zA-Z0-9_]+@[0-9]{10}$/.test(username) || !title || !category) return alert('Invalid or missing required fields');
      const formData = new FormData();
      formData.append('username', username);
      formData.append('title', title);
      formData.append('description', desc);
      formData.append('category', category);
      formData.append('price', price);
      const photo = document.getElementById('post-photo').files[0];
      if (photo) formData.append('photo', photo);
      const music = document.getElementById('post-music').files[0];
      if (music) formData.append('music', music);
      const doc = document.getElementById('post-document').files[0];
      if (doc) formData.append('document', doc);
      fetch('/api/service', { method: 'POST', body: formData })
        .then(res => {
          if (!res.ok) throw new Error(res.statusText);
          return res.json();
        })
        .then(() => {
          closePopup('post-form');
          document.getElementById('post-title').value = '';
          document.getElementById('post-desc').value = '';
          document.getElementById('post-category').value = '';
          document.getElementById('post-price').value = '';
          document.getElementById('post-photo').value = '';
          document.getElementById('post-music').value = '';
          document.getElementById('post-document').value = '';
        })
        .catch(err => alert('Error posting: ' + err.message));
    }

    // Send message
    function sendMessage() {
      const to = document.getElementById('msg-to').value;
      const content = document.getElementById('msg-content').value;
      if (!/^[a-zA-Z0-9_]+@[0-9]{10}$/.test(to) || !content) return alert('Invalid or missing fields');
      fetch('/api/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: currentUser, to, content })
      })
        .then(res => {
          if (!res.ok) throw new Error(res.statusText);
          document.getElementById('msg-content').value = '';
          loadMessages();
        })
        .catch(err => alert('Error sending: ' + err.message));
    }

    // Load messages
    function loadMessages() {
      const to = document.getElementById('msg-to').value;
      if (!to) {
        document.getElementById('message-list').innerHTML = '';
        document.getElementById('msg-status').innerText = '';
        return;
      }
      fetch(`/api/messages/${currentUser}`).then(res => res.json()).then(data => {
        const conv = data[to] || [];
        document.getElementById('message-list').innerHTML = conv.map(m => `<p>${m.from}: ${m.content} (${new Date(m.timestamp).toLocaleString()})</p>`).join('');
      });
      fetch(`/api/status/${to}`).then(res => res.json()).then(({status}) => {
        document.getElementById('msg-status').innerText = `${to} is ${status}`;
      }).catch(() => {});
    }

    // Save profile
    function saveProfile() {
      const newUser = document.getElementById('profile-username').value;
      if (!/^[a-zA-Z0-9_]+@[0-9]{10}$/.test(newUser)) return alert('Invalid username');
      currentUser = newUser;
      localStorage.setItem('username', currentUser);
      socket.emit('registerUser', currentUser);
      alert('Profile updated');
      loadPostedServices();
      renderServices();
    }

    // Load posted services
    function loadPostedServices() {
      document.getElementById('posted-services').innerHTML = services.filter(s => s.username === currentUser).map(s => `
        <div>${s.title} <span class="remove-btn" style="display:block;" onclick="removeService('${s.id}')">X</span></div>
      `).join('');
    }

    // Remove service
    function removeService(id) {
      if (!confirm('Remove this service?')) return;
      fetch(`/api/service/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: currentUser })
      })
        .then(res => {
          if (!res.ok) throw new Error(res.statusText);
          loadPostedServices();
        })
        .catch(err => alert('Error removing: ' + err.message));
    }

    // Render services
    function renderServices() {
      const container = document.getElementById('service-container');
      container.innerHTML = '';
      const query = document.getElementById('search-input').value.toLowerCase();
      services.forEach((s, i) => {
        if (query && !s.title.toLowerCase().includes(query)) return;
        const avgRating = s.ratings.length ? (s.ratings.reduce((a,b)=>a+b,0)/s.ratings.length).toFixed(1) : 0;
        const size = 50 + (avgRating * 10);
        const circle = document.createElement('div');
        circle.className = 'service-circle';
        circle.style.width = `${size}px`;
        circle.style.height = `${size}px`;
        circle.style.backgroundColor = categoryColors[s.category] || 'gray';
        if (s.photo) circle.style.backgroundImage = `url(${s.photo})`;
        circle.style.backgroundSize = 'cover';
        const isOwner = s.username === currentUser;
        circle.innerHTML = `
          <h3>${s.title}</h3>
          <p>Rating: ${avgRating}/5</p>
          ${isOwner ? `<span class="remove-btn" style="display:block;" onclick="event.stopPropagation(); removeService('${s.id}')">X</span>` : ''}
        `;
        circle.onclick = (e) => {
          if (e.target.className === 'remove-btn') return;
          if (circle.classList.contains('expanded')) {
            circle.classList.remove('expanded');
            circle.innerHTML = `
              <h3>${s.title}</h3>
              <p>Rating: ${avgRating}/5</p>
              ${isOwner ? `<span class="remove-btn" style="display:block;" onclick="event.stopPropagation(); removeService('${s.id}')">X</span>` : ''}
            `;
          } else {
            document.querySelectorAll('.service-circle.expanded').forEach(c => {
              if (c !== circle) c.click();
            });
            circle.classList.add('expanded');
            circle.innerHTML = `
              <h3>${s.title}</h3>
              <p>${s.description || ''}</p>
              <p>Price: ${s.price || 'N/A'}</p>
              ${s.photo ? `<img src="${s.photo}" alt="Photo">` : ''}
              ${s.music ? `<audio controls src="${s.music}"></audio>` : ''}
              ${s.document ? `<a href="${s.document}" target="_blank">Document</a>` : ''}
              <p>Rating: ${avgRating}/5</p>
              <select id="rate-${s.id}"><option>Rate</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
              <button onclick="event.stopPropagation(); rateService('${s.id}')">Submit Rating</button>
              <textarea id="msg-to-provider" placeholder="Message to provider..."></textarea>
              <button onclick="event.stopPropagation(); sendToProvider('${s.username}')">Send</button>
              ${isOwner ? `<span class="remove-btn" style="display:block;" onclick="event.stopPropagation(); removeService('${s.id}')">X</span>` : ''}
            `;
          }
        };
        circle.style.left = `${Math.random() * (window.innerWidth - size)}px`;
        circle.style.top = `${100 + Math.random() * (window.innerHeight - size - 150)}px`;
        velocities[i] = { vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2 };
        container.appendChild(circle);
      });
      animationStart = Date.now();
    }

    // Rate service
    function rateService(id) {
      const select = document.getElementById(`rate-${id}`);
      const rating = select.value;
      if (!rating || rating === 'Rate') return alert('Select a rating');
      fetch('/api/rate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, rating: parseInt(rating) })
      })
        .then(res => {
          if (!res.ok) throw new Error(res.statusText);
          select.value = 'Rate';
        })
        .catch(err => alert('Error rating: ' + err.message));
    }

    // Send to provider
    function sendToProvider(to) {
      const content = document.getElementById('msg-to-provider').value;
      if (!content) return alert('Enter a message');
      fetch('/api/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: currentUser, to, content })
      })
        .then(res => {
          if (!res.ok) throw new Error(res.statusText);
          document.getElementById('msg-to-provider').value = '';
        })
        .catch(err => alert('Error sending: ' + err.message));
    }

    // Search
    document.getElementById('search-btn').onclick = renderServices;
    document.getElementById('search-input').addEventListener('input', renderServices);

    // Animation
    function animateCircles() {
      const circles = document.querySelectorAll('.service-circle:not(.expanded)');
      if (Date.now() - animationStart > 60000) return;
      circles.forEach((c, i) => {
        let x = parseFloat(c.style.left);
        let y = parseFloat(c.style.top);
        const size = parseFloat(c.style.width) / 2;
        x += velocities[i].vx;
        y += velocities[i].vy;
        if (x <= 0 || x >= window.innerWidth - size*2) velocities[i].vx *= -1;
        if (y <= 80 || y >= window.innerHeight - size*2 - 60) velocities[i].vy *= -1;
        for (let j = 0; j < circles.length; j++) {
          if (i === j) continue;
          const c2 = circles[j];
          const x2 = parseFloat(c2.style.left);
          const y2 = parseFloat(c2.style.top);
          const size2 = parseFloat(c2.style.width) / 2;
          const dx = x + size - (x2 + size2);
          const dy = y + size - (y2 + size2);
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < size + size2) {
            const tempVx = velocities[i].vx;
            const tempVy = velocities[i].vy;
            velocities[i].vx = velocities[j].vx;
            velocities[i].vy = velocities[j].vy;
            velocities[j].vx = tempVx;
            velocities[j].vy = tempVy;
            const overlap = (size + size2) - dist;
            const angle = Math.atan2(dy, dx);
            x += Math.cos(angle) * overlap / 2;
            y += Math.sin(angle) * overlap / 2;
            c2.style.left = `${x2 - Math.cos(angle) * overlap / 2}px`;
            c2.style.top = `${y2 - Math.sin(angle) * overlap / 2}px`;
          }
        }
        c.style.left = `${x}px`;
        c.style.top = `${y}px`;
      });
      requestAnimationFrame(animateCircles);
    }

    // Start animation
    animateCircles();

    // Resize handler
    window.addEventListener('resize', renderServices);
  </script>
</body>
</html>
